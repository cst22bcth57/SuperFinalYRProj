<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Welfare Assistant</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <div class="chat-box" id="chatBox">
            <div class="bot-message">
                स्वागत है। मैं आपके जवाब के हिसाब से आपके काम की योजना बताने की कोशिश करूंगा।
            </div>
        </div>

        <div class="controls">
            <button class="mic-btn" id="micBtn">🎤</button>
            <p id="statusText">माइक बंद है</p>

            <div class="input-area">
                <input type="text" id="textInput" placeholder="यहां जवाब लिखें">
                <button onclick="sendMessage()">जवाब भेजें</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const input = document.getElementById("textInput");
        const micBtn = document.getElementById("micBtn");
        const statusText = document.getElementById("statusText");

        function appendMessage(text, type) {
            const div = document.createElement("div");
            div.className = type === "user" ? "user-message" : "bot-message";
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "hi-IN";
            speechSynthesis.speak(utterance);
        }

        async function sendMessage(message = null) {
            const msg = message || input.value.trim();

            if (!msg) return;

            appendMessage(msg, "user");
            input.value = "";

            const response = await fetch("/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: msg })
            });

            const data = await response.json();

            appendMessage(data.reply, "bot");
            speak(data.reply);
        }

        const SpeechRecognition =
            window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();

            recognition.lang = "hi-IN";
            recognition.continuous = true;

            micBtn.addEventListener("click", () => {
                recognition.start();
                statusText.innerText = "आप बोल रहे हैं...";
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                input.value = transcript;
                sendMessage(transcript);
            };

            recognition.onend = () => {
                statusText.innerText = "माइक बंद है";
            };
        } else {
            statusText.innerText =
                "Browser speech recognition support नहीं है";
        }
    </script>
</body>
</html>
